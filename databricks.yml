bundle:
  name: nominatim-geocoding-api

include:
  - resources/*.yml

variables:
  APP_NAME:
    description: "Databricks App name prefix"
    default: "nominatim-geocoding-api"
  PG_PROJECT_ID:
    description: "Lakebase Postgres project ID"
    default: "nominatim-lakebase"
  PG_BRANCH_ID:
    description: "Lakebase Postgres branch ID"
    default: "production"
  PG_MIN_CU:
    description: "Lakebase autoscaling minimum compute units"
    default: "0.5"
  PG_MAX_CU:
    description: "Lakebase autoscaling maximum compute units"
    default: "4"
  PG_USER:
    description: "Postgres user for Nominatim"
    default: "justin.monaldo@databricks.com"
  PG_DATABASE:
    description: "Postgres database name"
    default: "nominatim"
  PG_PORT:
    description: "Postgres port"
    default: "5432"
  PG_SSLMODE:
    description: "Postgres SSL mode"
    default: "require"
  UC_CATALOG:
    description: "Unity Catalog catalog name for volumes"
    default: "justinm"
  UC_SCHEMA:
    description: "Unity Catalog schema name for volumes"
    default: "nominatim"
  OSM_REGIONS:
    description: "Comma-separated OSM regions to download and import (e.g. monaco, virginia,maryland)"
    default: "monaco"

targets:
  dev:
    mode: development
    default: true

  test:
    mode: development

  prod:
    mode: production
