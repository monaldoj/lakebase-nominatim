bundle:
  name: nominatim-geocoding-api

# Databricks CLI version
databricks_cli_version: ">=0.213.0"

# Include patterns for deployment
include:
  - "*.py"
  - "requirements.txt"
  - "README.md"
  - "API_README.md"

# Exclude patterns
exclude:
  - "*.pyc"
  - "__pycache__"
  - ".env"
  - "*.log"
  - "tests/*"
  - "scripts/*"
  - "osm_data/*"
  - ".git/*"
  - ".claude/*"

targets:
  dev:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  apps:
    nominatim-api:
      name: nominatim-geocoding-api-${bundle.target}
      description: "Nominatim geocoding service - OpenStreetMap-based geocoding with OAuth authentication"

      # Source files to include
      source_code_path: ${workspace.file_path}

      resources:
        - name: web-server
          description: "FastAPI geocoding API server"
          serving_endpoint_name: nominatim-geocoding-${bundle.target}

      # Command to start the FastAPI server
      config:
        command:
          - "python"
          - "-m"
          - "uvicorn"
          - "app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8080"
          - "--workers"
          - "2"

      # Environment variables for OAuth-based authentication
      env:
        - name: PGINSTANCENAME
          value: "instance-9c6e6e14-9e28-4826-bb37-a5c58738022f"
        - name: PGHOST
          value: "instance-9c6e6e14-9e28-4826-bb37-a5c58738022f.database.cloud.databricks.com"
        - name: PGUSER
          value: "justin.monaldo@databricks.com"
        - name: PGDATABASE
          value: "nominatim"
        - name: PGPORT
          value: "5432"
        - name: PGSSLMODE
          value: "require"
        # OAuth tokens are generated automatically via databricks-sdk
        # No need for PGPASSWORD with OAuth authentication
